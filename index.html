<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>CropAlpha — 去背版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap');

:root {
  --bg:#0e0e10; --surf:#17171a; --surf2:#1f1f24; --bdr:#2e2e36;
  --acc:#b8ff57; --acc2:#57d4ff; --txt:#e8e8ec; --mut:#6b6b7a; --red:#ff5757;
  --pur:#c084fc;
  --sab:env(safe-area-inset-bottom,0px);
  --sat:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;
  height:100%;overflow:hidden;touch-action:manipulation;overscroll-behavior:none;
  display:flex;flex-direction:column}

header{display:flex;align-items:center;justify-content:space-between;
  padding:11px 18px;
  border-bottom:1px solid var(--bdr);background:var(--surf);flex-shrink:0;z-index:20}
.logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700}
.logo-icon{width:26px;height:26px;background:var(--pur);border-radius:7px;display:grid;place-items:center}
.badge{font-family:'DM Mono',monospace;font-size:12px;background:var(--surf2);
  border:1px solid var(--bdr);border-radius:20px;padding:3px 12px;color:var(--mut)}
.badge b{color:var(--acc)}

/* Toggle: rmbg mode */
.mode-toggle{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--mut);
  font-family:'DM Mono',monospace}
.toggle-track{width:36px;height:20px;background:var(--surf2);border:1px solid var(--bdr);
  border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle-track.on{background:var(--pur);border-color:var(--pur)}
.toggle-thumb{width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;
  top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.toggle-track.on .toggle-thumb{left:18px}
.toggle-lbl{color:var(--txt)}
.toggle-track.on+.toggle-lbl{color:var(--pur)}

.app{display:flex;flex:1;min-height:0;overflow:hidden}
.lpanel{width:58%;display:flex;flex-direction:column;border-right:1px solid var(--bdr);
  background:var(--surf);overflow:hidden}
.rpanel{width:42%;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.phdr{padding:8px 16px;border-bottom:1px solid var(--bdr);font-size:10px;
  font-family:'DM Mono',monospace;color:var(--mut);letter-spacing:1.5px;
  text-transform:uppercase;flex-shrink:0}
.cwrap{flex:1;position:relative;overflow:hidden;display:flex;
  align-items:center;justify-content:center;min-height:0}

/* bg-color swatch in panel header */
.bg-swatch-wrap{display:flex;align-items:center;gap:6px;padding:6px 16px;
  border-bottom:1px solid var(--bdr);flex-shrink:0;font-size:10px;
  font-family:'DM Mono',monospace;color:var(--mut)}
.bg-swatch{width:20px;height:20px;border-radius:4px;border:1px solid var(--bdr);
  cursor:pointer;flex-shrink:0;background:repeating-conic-gradient(#252525 0% 25%,#1c1c1c 0% 50%) 0 0/8px 8px}
.bg-swatch-inner{width:100%;height:100%;border-radius:3px}

/* Drop zone */
#dropZone{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;cursor:pointer;transition:background .2s}
#dropZone.over{background:rgba(192,132,252,.06);outline:2px dashed var(--pur)}
.dicon{width:56px;height:56px;border:2px dashed var(--bdr);border-radius:14px;
  display:grid;place-items:center;transition:border-color .2s}
#dropZone.over .dicon{border-color:var(--pur)}
.dtitle{font-size:15px;font-weight:700}
.dsub{font-size:12px;color:var(--mut)}
.dbtn{background:var(--pur);color:#000;border:none;border-radius:8px;
  padding:9px 22px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer}
.dbtn:active{opacity:.8;transform:scale(.97)}
#fileInput{display:none}

#edArea{display:none;position:absolute;inset:0;align-items:center;justify-content:center}
#edArea.on{display:flex}
#mainCv{display:block;image-rendering:auto}
#ovCv{position:absolute;top:0;left:0;cursor:crosshair;pointer-events:auto;touch-action:none}

.csec{padding:10px 16px;border-bottom:1px solid var(--bdr);
  display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.crow{display:flex;align-items:center;gap:7px}
.clbl{font-size:9px;font-family:'DM Mono',monospace;color:var(--mut);
  letter-spacing:1px;text-transform:uppercase;min-width:32px}
.ni{background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;
  color:var(--txt);font-family:'DM Mono',monospace;font-size:13px;
  padding:5px 6px;width:64px;text-align:center;-webkit-appearance:none}
.ni:focus{outline:none;border-color:var(--pur)}
.szdsp{font-family:'DM Mono',monospace;font-size:11px;color:var(--acc2);
  background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;
  padding:5px 8px;white-space:nowrap;margin-left:auto}

.abtns{display:grid;grid-template-columns:1fr 1fr;gap:6px;
  padding:10px 16px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.btn{border:none;border-radius:9px;padding:10px;font-family:'Syne',sans-serif;
  font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:4px;-webkit-user-select:none;user-select:none}
.btn:disabled{opacity:.25;pointer-events:none}
.btn:active:not(:disabled){transform:scale(.93);opacity:.82}
.bauto{background:linear-gradient(135deg,#1a0a2e,#0a1a2e);color:var(--pur);
  border:1px solid var(--pur);grid-column:1/-1;padding:13px;font-size:14px;position:relative;overflow:hidden}
.bauto::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(192,132,252,.1),rgba(87,212,255,.06));opacity:0;transition:opacity .2s}
.bauto:hover::before{opacity:1}
.bauto:disabled{opacity:.25;border-color:var(--bdr);color:var(--mut)}
.bprim{background:var(--acc);color:#000;grid-column:1/-1;padding:13px;font-size:14px}
.bsec{background:var(--surf2);color:var(--txt);border:1px solid var(--bdr)}
.bdl{background:var(--acc2);color:#000;grid-column:1/-1;padding:13px;font-size:14px}
.bdng{background:rgba(255,87,87,.1);color:var(--red);border:1px solid rgba(255,87,87,.3)}
.brst{background:var(--surf2);color:var(--mut);border:1px solid var(--bdr)}
.brst:hover{border-color:var(--red);color:var(--red)}

.psec{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.phdr2{padding:8px 16px;border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ptit{font-size:10px;font-family:'DM Mono',monospace;color:var(--mut);
  letter-spacing:1.5px;text-transform:uppercase}
.pgrid{flex:1;overflow-y:auto;padding:8px;display:grid;
  grid-template-columns:repeat(4,1fr);gap:5px;align-content:start;
  -webkit-overflow-scrolling:touch}
.pgrid::-webkit-scrollbar{width:3px}
.pgrid::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.pi{position:relative;aspect-ratio:1;border-radius:7px;overflow:hidden;
  border:1px solid var(--bdr);cursor:pointer;
  background:repeating-conic-gradient(#252525 0% 25%,#1c1c1c 0% 50%) 0 0/12px 12px;
  transition:border-color .15s,transform .12s}
.pi:hover{border-color:var(--pur);transform:scale(1.05)}
.pi img{width:100%;height:100%;object-fit:contain;display:block}
.pi-num{position:absolute;top:2px;left:3px;font-family:'DM Mono',monospace;
  font-size:8px;color:rgba(255,255,255,.55);background:rgba(0,0,0,.55);
  border-radius:3px;padding:1px 3px;pointer-events:none}
.pi-del{position:absolute;top:2px;right:2px;width:16px;height:16px;
  background:rgba(255,87,87,.85);border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:#fff;cursor:pointer;padding:0;line-height:1}
@media(hover:hover){.pi-del{display:none}.pi:hover .pi-del{display:flex}}
.empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px;gap:8px;color:var(--mut);font-size:12px;text-align:center}
.ibar{padding:7px 16px;padding-bottom:calc(7px + var(--sab));background:var(--surf);
  border-top:1px solid var(--bdr);font-family:'DM Mono',monospace;font-size:10px;
  color:var(--mut);display:flex;gap:12px;flex-shrink:0}
.ibar span{color:var(--txt)}

/* lightbox */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;
  flex-direction:column;align-items:center;justify-content:center;
  padding:20px;padding-bottom:calc(20px + var(--sab));gap:14px}
#lb.on{display:flex}
#lbImg{max-width:90vw;max-height:65vh;object-fit:contain;border-radius:10px;
  background:repeating-conic-gradient(#252525 0% 25%,#1c1c1c 0% 50%) 0 0/18px 18px;display:block}
.lbbtn{background:var(--surf2);color:var(--txt);border:1px solid var(--bdr);
  border-radius:9px;padding:11px 22px;font-family:'Syne',sans-serif;font-weight:700;
  font-size:13px;cursor:pointer}
.lbbtn:active{opacity:.75}
.lbrow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

.toast{position:fixed;bottom:calc(22px + var(--sab));left:50%;
  transform:translateX(-50%) translateY(16px);background:var(--surf2);
  border:1px solid var(--pur);color:var(--pur);padding:8px 18px;
  border-radius:8px;font-size:12px;font-family:'DM Mono',monospace;
  opacity:0;pointer-events:none;transition:all .22s;z-index:999;
  white-space:nowrap;max-width:92vw;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MOBILE ── */
@media(max-width:640px){
  header{padding:10px 14px;padding-top:calc(10px + var(--sat))}
  .app{flex-direction:column;flex:1;min-height:0;overflow:hidden}
  .lpanel{width:100%;height:60dvh;min-height:220px;border-right:none;
    border-bottom:1px solid var(--bdr);flex-shrink:0}
  .rpanel{width:100%;flex:1;display:block;overflow-y:auto;
    overflow-x:hidden;-webkit-overflow-scrolling:touch;min-height:0}
  .csec{padding:6px 12px;gap:5px}
  .crow{gap:5px}
  .clbl{min-width:28px;font-size:9px}
  .ni{width:56px;font-size:12px;padding:4px}
  .szdsp{font-size:10px;padding:4px 7px}
  .abtns{gap:5px;padding:7px 12px}
  .btn{padding:11px 8px;font-size:12px;border-radius:10px}
  .bprim,.bdl{padding:12px;font-size:13px}
  .psec{overflow:visible;min-height:auto}
  .pgrid{grid-template-columns:repeat(5,1fr);gap:4px;padding:7px;
    overflow:visible;flex:none}
  .ibar{padding:5px 12px;padding-bottom:calc(5px + var(--sab))}
  .phdr,.phdr2{padding:6px 12px}
  .bg-swatch-wrap{padding:5px 12px}
  .thresh-slider{width:55px}
}
@media(max-width:900px) and (orientation:landscape) and (max-height:520px){
  .app{flex-direction:row}
  .lpanel{width:52%;height:100%;border-right:1px solid var(--bdr);border-bottom:none;flex-shrink:0}
  .rpanel{width:48%;display:flex;flex-direction:column;overflow-y:auto;flex:1}
  .pgrid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<div style="background:linear-gradient(90deg,#1a0a2e,#0f0f1a,#1a0a2e);border-bottom:1px solid var(--pur);padding:7px 18px;padding-top:calc(7px + var(--sat));text-align:center;font-size:11px;font-family:'DM Mono',monospace;color:var(--pur);letter-spacing:0.5px;flex-shrink:0;line-height:1.8;">
  🍎 此工具為 <strong style="color:#fff">蘋果妹 LINE 貼圖教學</strong> 專用<br>
  YT：蘋果妹 &nbsp;｜&nbsp; IG：apple_meii
</div>
<header style="padding-top:11px;flex-shrink:0">
  <div class="logo">
    <div class="logo-icon">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x=".7" y=".7" width="12.6" height="12.6" rx="2" stroke="#000" stroke-width="1.4"/>
        <path d="M3.5 7h7M7 3.5v7" stroke="#000" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </div>
    CropAlpha <span style="color:var(--pur);font-size:11px;margin-left:4px">去背版・限 4×4 貼圖</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="mode-toggle">
      <div class="toggle-track on" id="rmbgToggle" onclick="toggleRmbg()">
        <div class="toggle-thumb"></div>
      </div>
      <span class="toggle-lbl" id="rmbgLbl">去背</span>
    </div>
    <div class="badge">已儲存 <b id="cnt">0</b> / 32</div>
  </div>
</header>

<div class="app">
  <div class="lpanel">
    <div class="phdr" id="phdr">一次上傳一張，下一張請按「上傳下一張」，最多裁切 32 張貼圖</div>

    <!-- Background color indicator -->
    <div class="bg-swatch-wrap" id="bgSwatchWrap" style="display:none">
      <span>偵測背景色</span>
      <div class="bg-swatch" id="bgSwatch" title="點擊手動選色">
        <div class="bg-swatch-inner" id="bgSwatchInner"></div>
      </div>
      <span id="bgHex" style="color:var(--txt)">—</span>
      <span id="bgAutoThresh" style="margin-left:auto;color:var(--pur);font-size:10px"></span>
    </div>

    <div class="cwrap" id="cwrap">
      <div id="dropZone">
        <div class="dicon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 3v14M5 10l7-7 7 7" stroke="#6b6b7a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 20h18" stroke="#6b6b7a" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="dtitle">拖曳圖片到這裡</div>
        <div class="dsub" id="dsub">或點選下方按鈕匯入</div>
        <button class="dbtn" onclick="document.getElementById('fileInput').click()">選擇圖片</button>
        <input type="file" id="fileInput" accept="image/*" multiple>
      </div>
      <div id="edArea">
        <canvas id="mainCv"></canvas>
        <canvas id="ovCv"></canvas>
      </div>
    </div>
  </div>

  <div class="rpanel">
    <div class="csec">
      <div class="crow">
        <span class="clbl">X</span>
        <input class="ni" type="number" inputmode="numeric" id="iX" value="0" min="0">
        <span class="clbl">Y</span>
        <input class="ni" type="number" inputmode="numeric" id="iY" value="0" min="0">
        <div class="szdsp" id="szdsp">— × —</div>
      </div>
      <div class="crow">
        <span class="clbl">寬</span>
        <input class="ni" type="number" inputmode="numeric" id="iW" value="100" min="1">
        <span class="clbl">高</span>
        <input class="ni" type="number" inputmode="numeric" id="iH" value="100" min="1">
      </div>
    </div>

    <div class="abtns">
      <div style="grid-column:1/-1;text-align:center;padding:2px 0 4px;font-size:10px;font-family:'DM Mono',monospace;color:var(--pur);letter-spacing:0.5px;display:none;" id="scrollHint">
        ↓ 往下滑查看選單按鈕與裁切預覽
      </div>
      <button class="btn bauto" id="btnAuto" onclick="autoDetect()" disabled>✦ 自動偵測貼圖</button>
      <button class="btn bprim" id="btnCrop" onclick="doCrop()" disabled>✂ 手動裁切並加入</button>
      <button class="btn bsec"  id="btnNext" onclick="nextFile()" disabled>↑ 上傳下一張</button>
      <button class="btn bsec"  onclick="resetSel()">↺ 重設框選</button>
      <button class="btn bdl"   id="btnDl"   onclick="downloadAll()" disabled>⬇ 下載 ZIP</button>
      <button class="btn bdng"  onclick="clearAll()">✕ 清空</button>
      <button class="btn brst"  onclick="location.reload()">↺ 全部重來</button>
    </div>

    <div class="psec">
      <div class="phdr2">
        <span class="ptit">已裁切預覽</span>
        <span id="pcnt" style="font-size:10px;color:var(--mut);font-family:'DM Mono',monospace"></span>
      </div>
      <div class="pgrid" id="pgrid">
        <div class="empty">
          <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
            <rect x="4" y="4" width="24" height="24" rx="4" stroke="#2e2e36" stroke-width="1.8"/>
            <path d="M4 20l7-7 5 5 4-4 8 8" stroke="#2e2e36" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          尚未裁切任何圖片
        </div>
      </div>
    </div>

    <div class="ibar">
      <span>檔：<span id="iName">—</span></span>
      <span>尺寸：<span id="iSize">—</span></span>
    </div>
  </div>
</div>

<div id="lb" onclick="if(event.target===this)closeLb()">
  <img id="lbImg" src="" alt="">
  <div class="lbrow"><button class="lbbtn" onclick="closeLb()">✕ 關閉</button></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ─── State ───────────────────────────────────────────────────────────────────
const mainCv = document.getElementById('mainCv');
const ovCv   = document.getElementById('ovCv');
const mCtx   = mainCv.getContext('2d');
const oCtx   = ovCv.getContext('2d');

let img = null, curName = '';
let queue = [], qIdx = 0;
let items = [];
let dragging = false, ds = {x:0,y:0};
let cr = {x:0,y:0,w:0,h:0};
let sc = 1, dW = 0, dH = 0;

// Background removal state
let rmbgEnabled = true;
let detectedBg  = {r:0,g:0,b:0};
let manualBg    = null;
let autoThresh  = 40;  // auto-computed, not user-adjustable

const MAX    = 32;
const isMob  = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
if (isMob) document.getElementById('dsub').textContent = '點下方按鈕從相簿匯入';
if (isMob) document.getElementById('scrollHint').style.display = 'block';

// ─── Toggle RMBG ─────────────────────────────────────────────────────────────
function toggleRmbg() {
  rmbgEnabled = !rmbgEnabled;
  const t = document.getElementById('rmbgToggle');
  const l = document.getElementById('rmbgLbl');
  t.classList.toggle('on', rmbgEnabled);
  l.textContent = rmbgEnabled ? '去背' : '保留背景';
  l.style.color  = rmbgEnabled ? 'var(--pur)' : 'var(--mut)';
}

// ─── File Handling ────────────────────────────────────────────────────────────
const fileInput = document.getElementById('fileInput');
const dropZone  = document.getElementById('dropZone');

fileInput.addEventListener('change', () => go(fileInput.files));

// Separate hidden input for "next image" — loads new source but keeps items[]
const nextFileInput = document.createElement('input');
nextFileInput.type = 'file';
nextFileInput.accept = 'image/*';
nextFileInput.style.display = 'none';
document.body.appendChild(nextFileInput);
nextFileInput.addEventListener('change', () => {
  if (!nextFileInput.files.length) return;
  const file = nextFileInput.files[0];
  nextFileInput.value = '';   // reset so same file can be picked again
  loadFile(file);             // loads new canvas, keeps items[] intact
});
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); go(e.dataTransfer.files); });
dropZone.addEventListener('click', e => { if (!e.target.closest('button')) fileInput.click(); });

function go(files) {
  queue = Array.from(files).filter(f => f.type.startsWith('image/'));
  qIdx  = 0;
  document.getElementById('btnAuto').disabled = true;
  if (queue.length) loadFile(queue[0]);
}

function loadFile(file) {
  curName = file.name;
  const r = new FileReader();
  r.onload = e => {
    const image = new Image();
    image.onload = () => {
      img = image;
      dropZone.style.display = 'none';
      document.getElementById('edArea').classList.add('on');
      document.getElementById('phdr').textContent = '偵測錯誤可手動畫框裁切';
      const n = file.name;
      document.getElementById('iName').textContent = n.length > 16 ? n.slice(0,14)+'…' : n;
      document.getElementById('iSize').textContent = `${image.naturalWidth}×${image.naturalHeight}`;
      detectBgColor();
      layoutCanvas();
      resetSel();
      document.getElementById('btnAuto').disabled = false;
      document.getElementById('btnNext').disabled = false;
    };
    image.src = e.target.result;
  };
  r.readAsDataURL(file);
}

// ─── Detect background color + adaptive threshold ─────────────────────────────
/*
  Uses histogram valley detection to find the natural boundary between
  background color cluster and foreground pixels. Works for any bg color.
*/
function detectBgColor() {
  const W = img.naturalWidth, H = img.naturalHeight;
  const SAMP = Math.min(W, H, 600);
  const ssc  = SAMP / Math.max(W, H);
  const sW = Math.round(W*ssc), sH = Math.round(H*ssc);
  const off = document.createElement('canvas');
  off.width=sW; off.height=sH;
  const ctx2 = off.getContext('2d', {willReadFrequently:true});
  ctx2.drawImage(img, 0, 0, sW, sH);
  const data = ctx2.getImageData(0, 0, sW, sH).data;

  // Sample corners for bg color
  const MARGIN = Math.max(3, Math.round(Math.min(sW,sH)*0.05));
  let rS=0,gS=0,bS=0,cnt=0;
  for (let dy=0;dy<MARGIN;dy++) {
    for (let dx=0;dx<MARGIN;dx++) {
      for (const [px,py] of [[dx,dy],[sW-1-dx,dy],[dx,sH-1-dy],[sW-1-dx,sH-1-dy]]) {
        const p=(py*sW+px)*4;
        if (data[p+3]<128) continue;
        rS+=data[p]; gS+=data[p+1]; bS+=data[p+2]; cnt++;
      }
    }
  }
  if (!cnt) { detectedBg={r:255,g:255,b:255}; autoThresh=40; return; }
  detectedBg = {r:Math.round(rS/cnt), g:Math.round(gS/cnt), b:Math.round(bS/cnt)};
  manualBg   = null;

  // Build distance histogram over whole image
  const BINS=200, MAX_DIST=200;
  const hist = new Float32Array(BINS);
  const bg = detectedBg;
  for (let i=0; i<sW*sH; i++) {
    const p=i*4;
    if (data[p+3]<128) continue;
    const dr=data[p]-bg.r, dg=data[p+1]-bg.g, db=data[p+2]-bg.b;
    const d=Math.sqrt(dr*dr+dg*dg+db*db);
    const bin=Math.min(BINS-1, Math.floor(d/MAX_DIST*BINS));
    hist[bin]++;
  }

  // Gaussian smooth the histogram (sigma≈2 bins)
  const sm = new Float32Array(BINS);
  for (let i=0;i<BINS;i++) {
    let s=0,w=0;
    for (let j=Math.max(0,i-4);j<=Math.min(BINS-1,i+4);j++) {
      const g=Math.exp(-0.5*((i-j)*(i-j))/4);
      s+=hist[j]*g; w+=g;
    }
    sm[i]=s/w;
  }

  // Find bg peak (first big peak, within first 50 bins)
  let bgPeak=0;
  for (let i=1;i<50;i++) if (sm[i]>sm[bgPeak]) bgPeak=i;

  // Find first valley after bg peak (local minimum within 80 bins after peak)
  let valley=bgPeak;
  for (let i=bgPeak+1;i<Math.min(bgPeak+80,BINS-1);i++) {
    if (sm[i]<sm[i-1]&&sm[i]<sm[i+1]) { valley=i; break; }
  }

  // Convert bin index back to distance
  const valleyDist = (valley+0.5)/BINS*MAX_DIST;
  autoThresh = Math.max(5, Math.min(60, Math.round(valleyDist)));

  updateBgSwatchUI();
  document.getElementById('bgSwatchWrap').style.display='flex';
  document.getElementById('bgAutoThresh').textContent=`自動容差 ${autoThresh}`;
}

function getBgColor() { return manualBg || detectedBg; }

function updateBgSwatchUI() {
  const c = getBgColor();
  const hex = `#${[c.r,c.g,c.b].map(v=>v.toString(16).padStart(2,'0')).join('')}`;
  document.getElementById('bgSwatchInner').style.background = hex;
  document.getElementById('bgHex').textContent = hex.toUpperCase();
}

// Recompute thresh when manual bg color changes - uses same histogram valley method
function detectBgColorForThresh() {
  if (!img) return;
  const W = img.naturalWidth, H = img.naturalHeight;
  const SAMP = Math.min(W, H, 600);
  const ssc  = SAMP / Math.max(W, H);
  const sW = Math.round(W*ssc), sH = Math.round(H*ssc);
  const off = document.createElement('canvas');
  off.width=sW; off.height=sH;
  const c2 = off.getContext('2d',{willReadFrequently:true});
  c2.drawImage(img,0,0,sW,sH);
  const data = c2.getImageData(0,0,sW,sH).data;
  const bg = getBgColor();

  const BINS=200, MAX_DIST=200;
  const hist = new Float32Array(BINS);
  for (let i=0;i<sW*sH;i++) {
    const p=i*4; if (data[p+3]<128) continue;
    const dr=data[p]-bg.r, dg=data[p+1]-bg.g, db=data[p+2]-bg.b;
    const d=Math.sqrt(dr*dr+dg*dg+db*db);
    hist[Math.min(BINS-1,Math.floor(d/MAX_DIST*BINS))]++;
  }
  const sm=new Float32Array(BINS);
  for (let i=0;i<BINS;i++) {
    let s=0,w=0;
    for (let j=Math.max(0,i-4);j<=Math.min(BINS-1,i+4);j++) {
      const g=Math.exp(-0.5*((i-j)*(i-j))/4); s+=hist[j]*g; w+=g;
    }
    sm[i]=s/w;
  }
  let bgPeak=0;
  for (let i=1;i<50;i++) if (sm[i]>sm[bgPeak]) bgPeak=i;
  let valley=bgPeak;
  for (let i=bgPeak+1;i<Math.min(bgPeak+80,BINS-1);i++) {
    if (sm[i]<sm[i-1]&&sm[i]<sm[i+1]){valley=i;break;}
  }
  const valleyDist=(valley+0.5)/BINS*MAX_DIST;
  autoThresh=Math.max(5,Math.min(60,Math.round(valleyDist)));
  document.getElementById('bgAutoThresh').textContent=`自動容差 ${autoThresh}`;
}

// ─── Canvas layout ────────────────────────────────────────────────────────────
function layoutCanvas() {
  const wrap = document.getElementById('cwrap');
  const rect = wrap.getBoundingClientRect();
  const avW  = Math.floor(rect.width  - 8);
  const avH  = Math.floor(rect.height - 8);
  if (avW <= 0 || avH <= 0) { requestAnimationFrame(layoutCanvas); return; }

  sc = Math.min(avW / img.naturalWidth, avH / img.naturalHeight, 1);
  dW = Math.round(img.naturalWidth  * sc);
  dH = Math.round(img.naturalHeight * sc);

  mainCv.width  = dW;  mainCv.height  = dH;
  ovCv.width    = dW;  ovCv.height    = dH;
  mainCv.style.width  = dW + 'px';  mainCv.style.height  = dH + 'px';
  ovCv.style.width    = dW + 'px';  ovCv.style.height    = dH + 'px';

  requestAnimationFrame(alignOverlay);
  mCtx.clearRect(0, 0, dW, dH);
  mCtx.drawImage(img, 0, 0, dW, dH);
  drawOverlay();
}

function alignOverlay() {
  const ea = document.getElementById('edArea').getBoundingClientRect();
  const mc = mainCv.getBoundingClientRect();
  ovCv.style.left = (mc.left - ea.left) + 'px';
  ovCv.style.top  = (mc.top  - ea.top)  + 'px';
}

window.addEventListener('resize', () => { if (img) layoutCanvas(); });

// ─── Pointer input ────────────────────────────────────────────────────────────
function evPos(cx, cy) {
  const r = ovCv.getBoundingClientRect();
  return {
    x: Math.max(0, Math.min(dW, cx - r.left)),
    y: Math.max(0, Math.min(dH, cy - r.top))
  };
}
function onDown(cx, cy) {
  if (!img) return;
  dragging = true; ds = evPos(cx, cy); cr = {...ds, w:0, h:0}; drawOverlay();
}
function onMove(cx, cy) {
  if (!dragging) return;
  const p = evPos(cx, cy);
  cr = {x:Math.min(ds.x,p.x),y:Math.min(ds.y,p.y),
        w:Math.abs(p.x-ds.x),h:Math.abs(p.y-ds.y)};
  syncFields(); drawOverlay();
}
function onUp() {
  if (!dragging) return;
  dragging = false;
  if (cr.w > 4 && cr.h > 4) document.getElementById('btnCrop').disabled = false;
  drawOverlay();
}
ovCv.addEventListener('mousedown', e => onDown(e.clientX, e.clientY));
ovCv.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
ovCv.addEventListener('mouseup', onUp);
ovCv.addEventListener('mouseleave', onUp);
ovCv.addEventListener('touchstart', e => { e.preventDefault(); onDown(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
ovCv.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
ovCv.addEventListener('touchend',   e => { e.preventDefault(); onUp(); }, {passive:false});

// ─── Overlay drawing ──────────────────────────────────────────────────────────
function drawOverlay() {
  oCtx.clearRect(0, 0, dW, dH);
  if (!cr.w || !cr.h) return;
  oCtx.fillStyle = 'rgba(0,0,0,0.5)';
  oCtx.fillRect(0, 0, dW, dH);
  oCtx.clearRect(cr.x, cr.y, cr.w, cr.h);
  const col = rmbgEnabled ? '#c084fc' : '#b8ff57';
  oCtx.strokeStyle = col;
  oCtx.lineWidth = isMob ? 2.5 : 1.5;
  oCtx.setLineDash([5,3]);
  oCtx.strokeRect(cr.x+.5, cr.y+.5, cr.w-1, cr.h-1);
  oCtx.setLineDash([]);
  const cs = isMob ? 14 : 10;
  oCtx.lineWidth = isMob ? 3 : 2;
  oCtx.strokeStyle = col;
  [[cr.x,cr.y,+cs,0,0,+cs],[cr.x+cr.w,cr.y,-cs,0,0,+cs],
   [cr.x,cr.y+cr.h,+cs,0,0,-cs],[cr.x+cr.w,cr.y+cr.h,-cs,0,0,-cs]]
  .forEach(([x,y,ax,ay,bx,by]) => {
    oCtx.beginPath(); oCtx.moveTo(x+ax,y+ay); oCtx.lineTo(x,y); oCtx.lineTo(x+bx,y+by); oCtx.stroke();
  });
  document.getElementById('szdsp').textContent =
    `${Math.round(cr.w/sc)} × ${Math.round(cr.h/sc)}`;
}

function syncFields() {
  document.getElementById('iX').value = Math.round(cr.x/sc);
  document.getElementById('iY').value = Math.round(cr.y/sc);
  document.getElementById('iW').value = Math.round(cr.w/sc);
  document.getElementById('iH').value = Math.round(cr.h/sc);
}
['iX','iY','iW','iH'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    if (!img) return;
    const x=+document.getElementById('iX').value||0, y=+document.getElementById('iY').value||0;
    const w=+document.getElementById('iW').value||1, h=+document.getElementById('iH').value||1;
    cr = {x:x*sc,y:y*sc,w:w*sc,h:h*sc};
    document.getElementById('szdsp').textContent = `${w} × ${h}`;
    drawOverlay();
    document.getElementById('btnCrop').disabled = !(w>0&&h>0);
  });
});

// ─── Background Removal (v6 - tested) ────────────────────────────────────────
/*
  1. Strict edge flood-fill (no loose pass)
  2. 1px fringe feathered to 25% alpha
  3. Remove isolated small components (< 0.5% of pixels) — cleans stray pixels
  4. Hole fill — restore original colors
  5. Auto-trim to content bounding box
*/
function removeBackground(offCtx, W, H, bgColor, thresh) {
  const imageData = offCtx.getImageData(0, 0, W, H);
  const d = imageData.data;
  const orig = new Uint8ClampedArray(d);

  const bgR=bgColor.r, bgG=bgColor.g, bgB=bgColor.b;
  const t2 = thresh*thresh;

  // Build strict bg candidate mask
  const isBg = new Uint8Array(W*H);
  for (let i=0;i<W*H;i++) {
    const p=i*4;
    if (d[p+3]<30){isBg[i]=1;continue;}
    const dr=d[p]-bgR, dg=d[p+1]-bgG, db=d[p+2]-bgB;
    isBg[i]=(dr*dr+dg*dg+db*db)<=t2?1:0;
  }

  // Edge flood fill
  const removed=new Uint8Array(W*H);
  const stack=[];
  function pushBg(x,y){
    if(x<0||x>=W||y<0||y>=H)return;
    const i=y*W+x;
    if(removed[i]||!isBg[i])return;
    removed[i]=1;stack.push(i);
  }
  for(let x=0;x<W;x++){pushBg(x,0);pushBg(x,H-1);}
  for(let y=0;y<H;y++){pushBg(0,y);pushBg(W-1,y);}
  while(stack.length){
    const i=stack.pop(),x=i%W,y=Math.floor(i/W);
    pushBg(x-1,y);pushBg(x+1,y);pushBg(x,y-1);pushBg(x,y+1);
  }

  // Apply removal + 1px fringe
  for(let i=0;i<W*H;i++){
    if(removed[i]){d[i*4+3]=0;continue;}
    const x=i%W,y=Math.floor(i/W);
    if((x>0&&removed[i-1])||(x<W-1&&removed[i+1])||
       (y>0&&removed[i-W])||(y<H-1&&removed[i+W])){
      d[i*4+3]=Math.round(d[i*4+3]*0.25);
    }
  }

  // ── Clean: remove isolated small components ──
  // Label connected opaque regions, remove those < min_size pixels
  const minSize = Math.max(10, Math.round(W*H*0.0025));
  const compId = new Int32Array(W*H).fill(-1);
  const compSizes = [];
  let nextId = 0;
  for(let i=0;i<W*H;i++){
    if(d[i*4+3]<=30||compId[i]>=0) continue;
    // BFS to label this component
    const cStack=[i]; compId[i]=nextId; let sz=0;
    while(cStack.length){
      const ci=cStack.pop(); sz++;
      const cx=ci%W, cy=Math.floor(ci/W);
      for(const [nx,ny] of [[cx-1,cy],[cx+1,cy],[cx,cy-1],[cx,cy+1]]){
        if(nx<0||nx>=W||ny<0||ny>=H) continue;
        const ni=ny*W+nx;
        if(d[ni*4+3]>30&&compId[ni]<0){compId[ni]=nextId;cStack.push(ni);}
      }
    }
    compSizes.push(sz); nextId++;
  }
  for(let i=0;i<W*H;i++){
    if(compId[i]>=0 && compSizes[compId[i]]<minSize) d[i*4+3]=0;
  }

  offCtx.putImageData(imageData,0,0);

  // ── Hole fill ──
  const id2=offCtx.getImageData(0,0,W,H); const d2=id2.data;
  const isTr=new Uint8Array(W*H);
  for(let i=0;i<W*H;i++) isTr[i]=d2[i*4+3]<30?1:0;
  const edgBg=new Uint8Array(W*H); const hSt=[];
  function pushH(x,y){
    if(x<0||x>=W||y<0||y>=H)return;
    const i=y*W+x;
    if(edgBg[i]||!isTr[i])return;
    edgBg[i]=1;hSt.push(i);
  }
  for(let x=0;x<W;x++){pushH(x,0);pushH(x,H-1);}
  for(let y=0;y<H;y++){pushH(0,y);pushH(W-1,y);}
  while(hSt.length){
    const i=hSt.pop(),x=i%W,y=Math.floor(i/W);
    pushH(x-1,y);pushH(x+1,y);pushH(x,y-1);pushH(x,y+1);
  }
  for(let i=0;i<W*H;i++){
    if(!isTr[i]||edgBg[i]) continue;
    d2[i*4]=orig[i*4]; d2[i*4+1]=orig[i*4+1];
    d2[i*4+2]=orig[i*4+2]; d2[i*4+3]=255;
  }
  offCtx.putImageData(id2,0,0);
}

// ── Auto-trim helper: crop canvas to content bounding box ────────────────────
function autotrimCanvas(srcCtx, W, H) {
  const d = srcCtx.getImageData(0,0,W,H).data;
  let x1=W,y1=H,x2=0,y2=0;
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    if(d[(y*W+x)*4+3]>10){
      if(x<x1)x1=x; if(x>x2)x2=x;
      if(y<y1)y1=y; if(y>y2)y2=y;
    }
  }
  if(x1>x2||y1>y2) return srcCtx.canvas; // nothing to trim
  // Add 2px padding
  x1=Math.max(0,x1-2); y1=Math.max(0,y1-2);
  x2=Math.min(W-1,x2+2); y2=Math.min(H-1,y2+2);
  const nw=x2-x1+1, nh=y2-y1+1;
  const out=document.createElement('canvas'); out.width=nw; out.height=nh;
  out.getContext('2d').drawImage(srcCtx.canvas, x1,y1,nw,nh, 0,0,nw,nh);
  return out;
}


// ─── Crop + optional bg removal ───────────────────────────────────────────────
function cropToCanvas(sx, sy, sw, sh) {
  const off = document.createElement('canvas');
  off.width = sw; off.height = sh;
  const offCtx = off.getContext('2d', {willReadFrequently: true});
  offCtx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
  if (rmbgEnabled) {
    removeBackground(offCtx, sw, sh, getBgColor(), autoThresh);
    // Auto-trim to content bounding box (removes empty transparent space)
    return autotrimCanvas(offCtx, sw, sh);
  }
  return off;
}

// ─── Auto-detect + bg removal ─────────────────────────────────────────────────
/*
  Algorithm (v4 - always 4×4, any aspect ratio):
  Always assumes 4×4 grid. Finds 3 row cuts and 3 col cuts by:
  1. Equal-division baseline (robust even when gaps are tiny or zero)
  2. Snap each cut to nearest local minimum within ±20% of cell size
  This works for square, landscape, and portrait sticker sheets.
*/
async function autoDetect() {
  if (!img) return;
  const btn = document.getElementById('btnAuto');
  btn.disabled = true;
  btn.textContent = '⏳ 分析中…';
  await new Promise(r => setTimeout(r, 30));

  try {
    const W = img.naturalWidth, H = img.naturalHeight;

    // ── Full-res pixel data ──
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const offCtx = off.getContext('2d', {willReadFrequently: true});
    offCtx.drawImage(img, 0, 0, W, H);
    const data = offCtx.getImageData(0, 0, W, H).data;

    const bg = getBgColor();
    const thresh = autoThresh;

    // ── Build fg mask ──
    const fg = new Float32Array(W * H);
    for (let i = 0; i < W * H; i++) {
      const p = i * 4;
      if (data[p+3] < 128) continue;
      const dr = data[p]-bg.r, dg = data[p+1]-bg.g, db = data[p+2]-bg.b;
      fg[i] = (dr*dr+dg*dg+db*db) > thresh*thresh ? 1 : 0;
    }

    // ── Gaussian smooth 1D ──
    function smooth(arr, sigma) {
      const r = Math.round(sigma*2), N = arr.length;
      const out = new Float32Array(N);
      for (let i = 0; i < N; i++) {
        let s = 0, w = 0;
        for (let j = Math.max(0,i-r); j <= Math.min(N-1,i+r); j++) {
          const g = Math.exp(-0.5*(i-j)*(i-j)/(sigma*sigma));
          s += arr[j]*g; w += g;
        }
        out[i] = s/w;
      }
      return out;
    }

    // ── Find 3 cuts in a projection (always 4 divisions) ──
    function findCuts(proj, N) {
      const sm = smooth(proj, 3);
      const iw = N / 4;
      const search = Math.round(iw * 0.20); // ±20% of cell width
      const cuts = [0];
      for (let c = 1; c < 4; c++) {
        const ideal = Math.round(c * iw);
        const lo = Math.max(0, ideal - search);
        const hi = Math.min(N, ideal + search);
        let minVal = Infinity, minIdx = ideal;
        for (let x = lo; x < hi; x++) {
          if (sm[x] < minVal) { minVal = sm[x]; minIdx = x; }
        }
        cuts.push(minIdx);
      }
      cuts.push(N);
      return cuts;
    }

    // ── Row projection → 4 row bands ──
    const rowProj = new Float32Array(H);
    for (let y = 0; y < H; y++) {
      let s = 0;
      for (let x = 0; x < W; x++) s += fg[y*W+x];
      rowProj[y] = s / W;
    }
    const rowCuts = findCuts(rowProj, H);

    // ── Per-row column projection → 4 col cuts each ──
    const rects = [];
    for (let ri = 0; ri < 4; ri++) {
      const y1 = rowCuts[ri], y2 = rowCuts[ri+1];
      const bandH = y2 - y1;
      const colProj = new Float32Array(W);
      for (let x = 0; x < W; x++) {
        let s = 0;
        for (let y = y1; y < y2; y++) s += fg[y*W+x];
        colProj[x] = s / bandH;
      }
      const colCuts = findCuts(colProj, W);
      for (let ci = 0; ci < 4; ci++) {
        const x1 = colCuts[ci], x2 = colCuts[ci+1];
        if ((x2-x1) > 10 && (y2-y1) > 10) {
          rects.push({x: x1, y: y1, w: x2-x1, h: y2-y1});
        }
      }
    }

    rects.sort((a,b) => a.y !== b.y ? a.y-b.y : a.x-b.x);

    if (!rects.length) { toast('⚠ 未偵測到貼圖，請手動框選'); return; }

    const available = MAX - items.length;
    if (available <= 0) { toast('已達上限 32 張！'); return; }
    const toAdd = rects.slice(0, available);

    const base = curName.replace(/\.[^.]+$/, '');
    for (let i = 0; i < toAdd.length; i++) {
      const r = toAdd[i];
      const cropCv = cropToCanvas(r.x, r.y, r.w, r.h);
      items.push({
        dataUrl: cropCv.toDataURL('image/png'),
        name: `${base}_auto${items.length+1}.png`,
        w: r.w, h: r.h
      });
    }

    updateCounter(); renderPreview();
    document.getElementById('btnDl').disabled = false;
    drawDetectedBoxes(toAdd);
    toast(`✓ 偵測到 ${toAdd.length} 張${rmbgEnabled?' (已去背)':''}`);

  } catch(e) {
    console.error(e); toast('❌ 偵測失敗：'+e.message);
  } finally {
    btn.disabled = false; btn.textContent = '✦ 自動偵測貼圖';
  }
}


function drawDetectedBoxes(rects) {
  oCtx.clearRect(0,0,dW,dH);
  oCtx.fillStyle='rgba(0,0,0,0.32)';
  oCtx.fillRect(0,0,dW,dH);
  rects.forEach((r,i)=>{
    const rx=Math.round(r.x*sc),ry=Math.round(r.y*sc);
    const rw=Math.round(r.w*sc),rh=Math.round(r.h*sc);
    oCtx.clearRect(rx,ry,rw,rh);
    oCtx.strokeStyle=rmbgEnabled?'#c084fc':'#b8ff57';
    oCtx.lineWidth=1.5;
    oCtx.setLineDash([5,3]);
    oCtx.strokeRect(rx+.5,ry+.5,rw-1,rh-1);
    oCtx.setLineDash([]);
    const fSize=Math.max(11,Math.min(22,Math.round(rw*0.14)));
    const label=String(i+1);
    const bw=fSize*label.length*0.65+8, bh=fSize+6;
    oCtx.fillStyle='rgba(0,0,0,0.72)';
    oCtx.beginPath();
    oCtx.roundRect?oCtx.roundRect(rx+3,ry+3,bw,bh,3):oCtx.rect(rx+3,ry+3,bw,bh);
    oCtx.fill();
    oCtx.fillStyle=rmbgEnabled?'#c084fc':'#b8ff57';
    oCtx.font=`bold ${fSize}px "DM Mono",monospace`;
    oCtx.textAlign='left'; oCtx.textBaseline='top';
    oCtx.fillText(label,rx+7,ry+6);
  });
}

// ─── Download ZIP ─────────────────────────────────────────────────────────────
function dataUrlToUint8(dataUrl) {
  const raw = atob(dataUrl.split(',')[1]);
  const arr = new Uint8Array(raw.length);
  for (let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return arr;
}

async function downloadAll() {
  if (!items.length) return;
  const btn = document.getElementById('btnDl');
  btn.disabled = true;
  toast('⏳ 打包中…');
  try {
    const zip = new JSZip();
    const folder = zip.folder('CropAlpha');
    items.forEach(it => folder.file(it.name, dataUrlToUint8(it.dataUrl)));
    const blob = await zip.generateAsync({type:'blob', compression:'STORE'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download=`CropAlpha_去背_${items.length}張.zip`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 3000);
    toast(`✓ 已下載 ZIP（${items.length} 張）`);
  } catch(e) {
    toast('❌ 打包失敗'); console.error(e);
  } finally { btn.disabled=false; }
}

// ─── Misc ─────────────────────────────────────────────────────────────────────
function removeItem(i) {
  items.splice(i,1); updateCounter(); renderPreview();
  document.getElementById('btnDl').disabled=!items.length;
}
function clearAll() {
  if (!items.length) return;
  items=[]; updateCounter(); renderPreview();
  document.getElementById('btnDl').disabled=true;
  toast('已清空所有裁切');
}
function updateCounter() { document.getElementById('cnt').textContent=items.length; }

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),2500);
}

document.body.addEventListener('touchmove', e => {
  if (!e.target.closest('.rpanel')) e.preventDefault();
}, {passive:false});
</script>
